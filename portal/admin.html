<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HSG Property — Staff Admin</title>
  <meta name="theme-color" content="#121212">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://gdbdcyqafhobzboumyrf.supabase.co; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; form-action 'self'">
  <link rel="icon" href="../icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Slab:wght@500;700&display=swap">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="portal.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div class="appbar-inner">
        <img class="appbar-logo" src="../assets/hsg-logo.png" alt="HSG Attorneys">
        <div class="appbar-titles"><span class="appbar-sub">Staff admin</span></div>
        <span class="appbar-spacer"></span>
        <a class="btn btn-ghost btn-sm" href="index.html">Client view</a>
        <button class="btn btn-ghost btn-sm is-hidden" id="sign-out" type="button">Sign out</button>
      </div>
    </header>

    <main class="admin-main">
      <!-- Login gate (staff only) -->
      <section id="admin-login">
        <div class="lookup-card">
          <h1>Staff sign in</h1>
          <p class="sub">HSG staff only. Use your firm email and password.</p>
          <form id="login-form" novalidate>
            <label class="field">
              <span class="field-label">Email</span>
              <div class="input-plain"><input id="lg-email" type="email" autocomplete="username" placeholder="you@hsgattorneys.co.za"></div>
            </label>
            <label class="field">
              <span class="field-label">Password</span>
              <div class="input-plain"><input id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
            </label>
            <button class="btn btn-primary btn-block" id="lg-go" type="submit">Sign in</button>
          </form>
          <div class="error is-hidden" id="lg-error"></div>
        </div>
      </section>

      <section id="admin-list" class="is-hidden">
        <div class="admin-bar">
          <h1>Matters</h1>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-primary btn-sm" id="new-matter" type="button">+ New matter</button>
          </div>
        </div>
        <p class="admin-note">Live — changes save to the firm database and appear instantly in the client tracker.</p>
        <ul class="matter-list"></ul>
      </section>

      <section id="admin-editor" class="is-hidden"></section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <p class="copyright">© <span id="year"></span> HSG Attorneys <span class="division">Staff admin (prototype)</span></p>
      </div>
    </footer>
  </div>

  <script src="../js/lib/supabase.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
